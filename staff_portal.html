<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - My Own School</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: linear-gradient(180deg, #f8fafc 0%, #eef6ff 100%);
            min-height: 100vh;
        }

        .portal-shell {
            max-width: 1080px;
            margin: 0 auto;
            padding: 2rem;
        }

        .portal-banner {
            background: linear-gradient(135deg, #0f766e, #115e59);
            color: white;
            border-radius: 28px;
            padding: 2.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .logout-btn {
            position: absolute;
            right: 1.5rem;
            top: 1.5rem;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            padding: 0.65rem 1rem;
            border-radius: 999px;
            cursor: pointer;
        }

        .profile-card,
        .portal-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem;
        }

        .profile-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .profile-main {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .avatar {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: #d1fae5;
            color: #047857;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border-left: 4px solid #10b981;
            padding: 1.2rem;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }

        .detail-box {
            background: #f8fafc;
            border-radius: var(--radius-md);
            padding: 1rem;
        }

        .detail-box strong {
            display: block;
            margin-bottom: 0.3rem;
        }
    </style>
</head>

<body>
    <div class="portal-shell">
        <section class="portal-banner">
            <button class="logout-btn" onclick="logout()">Logout</button>
            <h1>Staff Portal</h1>
            <p>View your employment profile, account details, and salary information.</p>
        </section>

        <section class="profile-card">
            <div class="profile-main">
                <div class="avatar" id="staffAvatar">S</div>
                <div>
                    <h2 id="staffName">Loading...</h2>
                    <p id="staffRole" style="color: var(--text-secondary);">Role: Staff</p>
                </div>
            </div>
            <div class="credential-badge">
                <i data-lucide="badge-check" width="16"></i>
                Staff Account Active
            </div>
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.4rem;">Monthly Salary</div>
                <div id="staffSalary" style="font-size:1.5rem;font-weight:700;color:#047857;">PKR 0</div>
            </div>
            <div class="stat-card" style="border-left-color:#3b82f6;">
                <div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.4rem;">Staff ID</div>
                <div id="staffCode" style="font-size:1.3rem;font-weight:700;color:#1d4ed8;">-</div>
            </div>
            <div class="stat-card" style="border-left-color:#f59e0b;">
                <div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.4rem;">Branch</div>
                <div id="staffBranch" style="font-size:1.2rem;font-weight:700;color:#b45309;">-</div>
            </div>
        </section>

        <section class="portal-card">
            <h3 style="margin-top:0;">Profile Details</h3>
            <div class="detail-grid">
                <div class="detail-box"><strong>Father's Name</strong><span id="staffFather">-</span></div>
                <div class="detail-box"><strong>CNIC</strong><span id="staffCnic">-</span></div>
                <div class="detail-box"><strong>Phone</strong><span id="staffPhone">-</span></div>
                <div class="detail-box"><strong>Email</strong><span id="staffEmail">-</span></div>
                <div class="detail-box"><strong>Gender</strong><span id="staffGender">-</span></div>
                <div class="detail-box"><strong>Address</strong><span id="staffAddress">-</span></div>
                <div class="detail-box"><strong>Bank Name</strong><span id="staffBankName">-</span></div>
                <div class="detail-box"><strong>Account Number</strong><span id="staffAccountNumber">-</span></div>
            </div>
        </section>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="auth.js"></script>
    <script>
        const STORAGE_KEY_STAFF = 'eduCore_staff';
        const loggedInUser = JSON.parse(sessionStorage.getItem('loggedInUser') || 'null');

        if (!loggedInUser || loggedInUser.role !== 'Staff') {
            window.location.href = 'index.html';
        }

        function loadStaffProfile() {
            const staff = JSON.parse(localStorage.getItem(STORAGE_KEY_STAFF) || '[]');
            const profile = staff.find(member => member.id === loggedInUser.id);
            if (!profile) return;

            document.getElementById('staffAvatar').textContent = (profile.fullName || 'S').charAt(0).toUpperCase();
            document.getElementById('staffName').textContent = profile.fullName || 'Staff';
            document.getElementById('staffRole').textContent = `Role: ${profile.designation || 'Staff Member'}`;
            document.getElementById('staffSalary').textContent = `PKR ${parseInt(profile.salary || 0, 10).toLocaleString()}`;
            document.getElementById('staffCode').textContent = profile.employeeCode || '-';
            document.getElementById('staffBranch').textContent = profile.bankBranch || '-';
            document.getElementById('staffFather').textContent = profile.fatherName || '-';
            document.getElementById('staffCnic').textContent = profile.cnic || '-';
            document.getElementById('staffPhone').textContent = profile.phone || '-';
            document.getElementById('staffEmail').textContent = profile.email || '-';
            document.getElementById('staffGender').textContent = profile.gender || '-';
            document.getElementById('staffAddress').textContent = profile.address || '-';
            document.getElementById('staffBankName').textContent = profile.bankName || '-';
            document.getElementById('staffAccountNumber').textContent = profile.bankAccountNumber || '-';
        }

        function logout() {
            sessionStorage.removeItem('loggedInUser');
            sessionStorage.removeItem('eduCore_token');
            window.location.href = 'index.html';
        }

        window.onload = () => {
            loadStaffProfile();
            lucide.createIcons();
        };
    </script>
</body>

</html>
