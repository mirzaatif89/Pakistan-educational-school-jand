<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complain Box - PESS JAND</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="style.css?v=20260603-kids-roots-jand-brand">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .complaint-type-grid { display:grid; grid-template-columns:repeat(3,minmax(180px,1fr)); gap:1rem; margin-bottom:1rem; }
        .complaint-type-card { background:#fff; border:1px solid #cfe8e5; border-radius:12px; padding:1rem; box-shadow:0 10px 24px rgba(15,23,42,.05); display:flex; align-items:center; gap:.85rem; cursor:pointer; }
        .complaint-type-card.active { border-color:#14b8a6; box-shadow:0 0 0 3px rgba(20,184,166,.12); }
        .complaint-type-icon { width:42px; height:42px; border-radius:10px; background:rgba(20,184,166,.12); color:#0f766e; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
        .complaint-type-card h3 { margin:0; font-size:.98rem; }
        .complaint-type-card p { margin:.2rem 0 0; color:var(--text-secondary); font-size:.8rem; }
        .module-panel { background:#fff; border:1px solid #cfe8e5; border-radius:14px; padding:1.25rem; box-shadow:0 12px 28px rgba(15,23,42,.06); margin-bottom:1rem; }
        .family-complaint-form { display:grid; grid-template-columns:repeat(3,minmax(180px,1fr)); gap:1rem; align-items:end; }
        .family-complaint-form .wide { grid-column:1 / -1; }
        .family-complaint-form label { display:block; margin-bottom:.4rem; color:var(--text-secondary); font-weight:700; font-size:.85rem; }
        .family-complaint-form input, .family-complaint-form textarea { width:100%; border:1px solid var(--border-color); border-radius:8px; padding:.7rem .8rem; font:inherit; }
        .family-complaint-form textarea { min-height:86px; resize:vertical; }
        .complaint-list { display:grid; gap:1rem; }
        .complaint-card { border:1px solid #d9ece9; border-radius:12px; padding:1rem; background:#fbfefe; display:grid; gap:.85rem; }
        .complaint-top { display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
        .complaint-top h3 { margin:0; font-size:1rem; }
        .muted { color:var(--text-secondary); font-size:.86rem; }
        .status-pill { display:inline-flex; align-items:center; justify-content:center; min-width:88px; border-radius:999px; padding:.32rem .75rem; font-size:.78rem; font-weight:800; line-height:1; }
        .status-pill.pending { background:#fef3c7; color:#92400e; }
        .status-pill.in-progress { background:#dbeafe; color:#1d4ed8; }
        .status-pill.replied { background:#dcfce7; color:#166534; }
        .status-pill.resolved { background:#ccfbf1; color:#0f766e; }
        .status-pill.closed { background:#e5e7eb; color:#374151; }
        .reply-box { display:grid; gap:.5rem; margin-top:.9rem; }
        .reply-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
        .reply-box label { color:var(--text-secondary); font-weight:800; font-size:.82rem; }
        .reply-box textarea, .reply-box select { width:100%; min-height:44px; border:1px solid #cbd5e1; border-radius:10px; padding:.7rem; font:inherit; resize:vertical; background:#fff; }
        .reply-box textarea { min-height:86px; }
        .action-row { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.6rem; }
        .mini-btn { min-height:34px; border:0; border-radius:8px; padding:.45rem .75rem; font-weight:800; cursor:pointer; display:inline-flex; align-items:center; gap:.35rem; }
        .mini-btn.primary { background:#14b8a6; color:#fff; }
        .mini-btn.file { background:#e0f2fe; color:#0369a1; }
        .mini-btn.delete { background:#fee2e2; color:#b91c1c; }
        .empty-note { padding:1rem; border:1px dashed #cbd5e1; border-radius:12px; color:var(--text-secondary); background:#f8fafc; }
        @media (max-width:900px){ .complaint-type-grid,.family-complaint-form{ grid-template-columns:1fr; } }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-section"><img class="sidebar-logo-img" src="images/logo.png" alt="PESS JAND logo"></div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
                <a href="students.html" class="nav-item"><i data-lucide="users"></i><span>Students</span></a>
                <a href="teachers.html" class="nav-item"><i data-lucide="book-open"></i><span>Teachers</span></a>
                <a href="staff.html" class="nav-item"><i data-lucide="briefcase"></i><span>Staff</span></a>
                <a href="classes.html" class="nav-item"><i data-lucide="school"></i><span>Classes</span></a>
                <a href="fees.html" class="nav-item"><i data-lucide="credit-card"></i><span>Fees</span></a>
                <a href="fee_challan.html" class="nav-item"><i data-lucide="file-text"></i><span>Fee Challan</span></a>
                <a href="teacher_salaries.html" class="nav-item"><i data-lucide="wallet"></i><span>Salaries</span></a>
                <a href="exams.html" class="nav-item"><i data-lucide="clipboard-list"></i><span>Exams</span></a>
                <a href="revenue.html" class="nav-item"><i data-lucide="trending-up"></i><span>Revenue</span></a>
                <a href="permissions.html" class="nav-item"><i data-lucide="shield"></i><span>Permissions</span></a>
                <a href="aboutme.html" class="nav-item"><i data-lucide="info"></i><span>About Us</span></a>
                <a href="#" class="nav-item" onclick="logoutUser(event)"><i data-lucide="log-out"></i><span>Logout</span></a>
            </nav>
            <a href="settings.html" class="user-profile"><div class="avatar">AD</div><div class="user-info"><h4>Admin User</h4><p>Principal</p></div></a>
        </aside>
        <main class="main-content">
            <header class="header"><div><h1>Complain Box</h1><p style="color:var(--text-secondary); margin-top:.3rem;">Review student, teacher, and family complaints.</p></div></header>
            <section class="complaint-type-grid">
                <button class="complaint-type-card active" type="button" data-complaint-filter="Student">
                    <span class="complaint-type-icon"><i data-lucide="graduation-cap"></i></span>
                    <span><h3>Student Complain</h3><p>Student portal complaints</p></span>
                </button>
                <button class="complaint-type-card" type="button" data-complaint-filter="Teacher">
                    <span class="complaint-type-icon"><i data-lucide="book-open"></i></span>
                    <span><h3>Teacher Complain</h3><p>Teacher portal complaints</p></span>
                </button>
                <button class="complaint-type-card" type="button" data-complaint-filter="Family">
                    <span class="complaint-type-icon"><i data-lucide="home"></i></span>
                    <span><h3>Parent Complain</h3><p>Physically received complaints</p></span>
                </button>
            </section>
            <section class="module-panel" id="familyComplaintPanel" style="display:none;">
                <h2 style="margin:0 0 1rem;">Enter Family Complaint</h2>
                <form id="familyComplaintForm" class="family-complaint-form">
                    <div><label>Family Name</label><input type="text" id="familyComplaintName" placeholder="e.g. Ahmed Family" required></div>
                    <div><label>Contact No</label><input type="tel" id="familyComplaintPhone" placeholder="03xxxxxxxxx"></div>
                    <div><label>Subject</label><input type="text" id="familyComplaintSubject" placeholder="Complaint subject" required></div>
                    <div class="wide"><label>Complaint Details</label><textarea id="familyComplaintMessage" required placeholder="Write family complaint details"></textarea></div>
                    <div><button class="btn btn-primary" type="submit"><i data-lucide="save"></i> Save Family Complaint</button></div>
                </form>
            </section>
            <section class="module-panel">
                <div id="complaintList" class="complaint-list"></div>
            </section>
        </main>
    </div>
    <script src="auth.js?v=20260520-sidebar-requested-order"></script>
    <script src="script.js?v=20260520-sidebar-classes-restore"></script>
    <script>
        const COMPLAINT_KEY = 'eduCore_complaints';
        let activeComplaintFilter = 'Student';
        const complaintHashFilters = {
            '#student': 'Student',
            '#teacher': 'Teacher',
            '#parents': 'Family',
            '#parent': 'Family',
            '#family': 'Family'
        };
        function readComplaints() { try { return JSON.parse(localStorage.getItem(COMPLAINT_KEY) || '[]'); } catch (_e) { return []; } }
        function saveComplaints(items) { localStorage.setItem(COMPLAINT_KEY, JSON.stringify(items)); }
        function esc(value) { return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[char])); }
        function sanitizeFileName(fileName) {
            return String(fileName || 'complaint-file').trim().replace(/[\\/:*?"<>|]+/g, '-') || 'complaint-file';
        }
        function downloadComplaintFile(id) {
            const item = readComplaints().find((complaint) => complaint.id === id);
            if (!item?.file?.dataUrl) {
                showAppAlert('No file is attached to this complaint.', 'File Missing');
                return;
            }
            const link = document.createElement('a');
            link.href = item.file.dataUrl;
            link.download = sanitizeFileName(item.file.name || 'complaint-file');
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            link.remove();
        }
        function getComplaintThread(item) {
            const thread = Array.isArray(item.thread) ? [...item.thread] : [];
            if (item.reply && !thread.some((entry) => entry.role === 'Admin' && entry.message === item.reply)) {
                thread.push({ role: 'Admin', name: 'Admin', message: item.reply, createdAt: item.repliedAt || item.updatedAt || item.createdAt });
            }
            return thread.sort((a, b) => String(a.createdAt || '').localeCompare(String(b.createdAt || '')));
        }
        function normalizeComplaintStatus(status = 'Pending') {
            const value = String(status || 'Pending').trim().toLowerCase();
            if (value === 'in progress' || value === 'in-progress') return 'In Progress';
            if (value === 'reply' || value === 'replied') return 'Replied';
            if (value === 'resolve' || value === 'resolved' || value === 'action taken') return 'Resolved';
            if (value === 'closed') return 'Closed';
            return 'Pending';
        }
        function statusClass(status = 'Pending') {
            return normalizeComplaintStatus(status).toLowerCase().replace(/\s+/g, '-');
        }
        function renderComplaints() {
            const complaints = readComplaints()
                .filter((item) => String(item.senderRole || '').toLowerCase() === activeComplaintFilter.toLowerCase())
                .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
            if (!complaints.length) {
                complaintList.innerHTML = `<div class="empty-note">No ${esc(activeComplaintFilter.toLowerCase())} complaints have been submitted yet.</div>`;
                return;
            }
            complaintList.innerHTML = complaints.map((item) => {
                const status = normalizeComplaintStatus(item.status);
                const canReply = activeComplaintFilter !== 'Family';
                return `
                    <article class="complaint-card">
                        <div class="complaint-top">
                            <div>
                                <h3>${esc(item.subject || 'Complaint')}</h3>
                                <div class="muted">${esc(item.senderRole || '-')} - ${esc(item.senderName || '-')} ${item.senderClass ? `| ${esc(item.senderClass)}` : ''}</div>
                                <div class="muted">${esc(item.createdAt ? new Date(item.createdAt).toLocaleString() : '')}</div>
                            </div>
                            <span class="status-pill ${statusClass(status)}">${esc(status)}</span>
                        </div>
                        <p>${esc(item.message || '-')}</p>
                        ${item.file?.dataUrl ? `<button class="mini-btn file" onclick="downloadComplaintFile('${esc(item.id)}')"><i data-lucide="download" width="14"></i> ${esc(item.file.name || 'Download File')}</button>` : ''}
                        ${getComplaintThread(item).map((entry) => `<div class="empty-note"><strong>${esc(entry.role || 'Reply')} ${entry.name ? `- ${esc(entry.name)}` : ''}:</strong><br>${esc(entry.message || '-')}<div class="muted">${esc(entry.createdAt ? new Date(entry.createdAt).toLocaleString() : '')}</div></div>`).join('')}
                        ${item.actionTaken ? `<div class="empty-note"><strong>Action Taken:</strong><br>${esc(item.actionTaken)}<div class="muted">${esc(item.actionAt ? new Date(item.actionAt).toLocaleString() : '')}</div></div>` : ''}
                        <div class="reply-box">
                            <div class="reply-grid">
                                ${canReply ? `<div><label for="reply-${esc(item.id)}">Reply to ${esc(activeComplaintFilter)}</label><textarea id="reply-${esc(item.id)}" placeholder="Write reply for ${esc(activeComplaintFilter.toLowerCase())}"></textarea></div>` : ''}
                                <div><label for="action-${esc(item.id)}">Action Taken</label><textarea id="action-${esc(item.id)}" placeholder="Write action taken"></textarea></div>
                            </div>
                            <div>
                                <label for="status-${esc(item.id)}">Status</label>
                                <select id="status-${esc(item.id)}">
                                    ${['Pending', 'In Progress', 'Replied', 'Resolved', 'Closed'].map((option) => `<option value="${option}" ${status === option ? 'selected' : ''}>${option}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="action-row">
                            <button class="mini-btn primary" onclick="updateComplaint('${esc(item.id)}')"><i data-lucide="send" width="14"></i> Save Update</button>
                            <button class="mini-btn delete" onclick="deleteComplaint('${esc(item.id)}')"><i data-lucide="trash-2" width="14"></i> Delete</button>
                        </div>
                    </article>
                `;
            }).join('');
            if (window.lucide) window.lucide.createIcons();
        }
        function updateComplaint(id) {
            const items = readComplaints();
            const index = items.findIndex((item) => item.id === id);
            if (index < 0) return;
            const canReply = String(items[index].senderRole || '').toLowerCase() !== 'family';
            const reply = document.getElementById(`reply-${id}`)?.value.trim() || '';
            const actionTaken = document.getElementById(`action-${id}`)?.value.trim() || '';
            const selectedStatus = normalizeComplaintStatus(document.getElementById(`status-${id}`)?.value || items[index].status || 'Pending');
            if (canReply && !reply && !actionTaken && selectedStatus === normalizeComplaintStatus(items[index].status)) {
                showAppAlert('Write a reply, action taken, or change status.', 'Missing Update');
                return;
            }
            if (!canReply && !actionTaken && selectedStatus === normalizeComplaintStatus(items[index].status)) {
                showAppAlert('Write action taken or change status.', 'Missing Action');
                return;
            }
            const now = new Date().toISOString();
            const thread = getComplaintThread(items[index]);
            if (canReply && reply) {
                thread.push({ role: 'Admin', name: 'Admin', message: reply, createdAt: now });
            }
            items[index] = {
                ...items[index],
                ...(canReply && reply ? { reply, repliedAt: now } : {}),
                ...(canReply ? { thread } : {}),
                ...(actionTaken ? { actionTaken, actionAt: now } : {}),
                status: selectedStatus,
                updatedAt: now
            };
            saveComplaints(items);
            renderComplaints();
            showAppAlert('Complaint update saved.', 'Update Saved');
        }
        async function deleteComplaint(id) {
            const confirmed = await showAppConfirm('Delete this complaint?', 'Delete Complaint');
            if (!confirmed) return;
            saveComplaints(readComplaints().filter((item) => item.id !== id));
            renderComplaints();
        }
        function applyComplaintFilter(filter) {
            activeComplaintFilter = filter || 'Student';
            document.querySelectorAll('[data-complaint-filter]').forEach((item) => {
                item.classList.toggle('active', item.dataset.complaintFilter === activeComplaintFilter);
            });
            document.getElementById('familyComplaintPanel').style.display = activeComplaintFilter === 'Family' ? 'block' : 'none';
            renderComplaints();
        }
        function applyComplaintHashFilter() {
            const filter = complaintHashFilters[String(window.location.hash || '').toLowerCase()];
            if (filter) applyComplaintFilter(filter);
        }
        document.querySelectorAll('[data-complaint-filter]').forEach((card) => {
            card.addEventListener('click', () => {
                applyComplaintFilter(card.dataset.complaintFilter || 'Student');
            });
        });
        document.getElementById('familyComplaintForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const items = readComplaints();
            items.push({
                id: `CMP-${Date.now()}`,
                senderRole: 'Family',
                senderName: document.getElementById('familyComplaintName').value.trim(),
                senderClass: document.getElementById('familyComplaintPhone').value.trim(),
                subject: document.getElementById('familyComplaintSubject').value.trim(),
                message: document.getElementById('familyComplaintMessage').value.trim(),
                status: 'Pending',
                thread: [],
                actionTaken: '',
                createdAt: new Date().toISOString()
            });
            saveComplaints(items);
            event.target.reset();
            renderComplaints();
            showAppAlert('Family complaint saved.', 'Complaint Saved');
        });
        applyComplaintHashFilter();
        if (!complaintHashFilters[String(window.location.hash || '').toLowerCase()]) renderComplaints();
        window.addEventListener('hashchange', applyComplaintHashFilter);
        if (window.lucide) window.lucide.createIcons();
    </script>
</body>

</html>
