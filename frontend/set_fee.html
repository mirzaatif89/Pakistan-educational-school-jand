<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Fee - PESS JAND</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="style.css?v=20260603-kids-roots-jand-brand">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .set-fee-layout { display:grid; grid-template-columns:minmax(280px,340px) minmax(760px,1fr); gap:1rem; align-items:start; }
        .set-fee-panel { background:#fff; border:1px solid var(--border-color); border-radius:var(--radius-lg); padding:1.25rem; box-shadow:var(--shadow-sm); }
        .fee-history-panel { width:100%; min-height:168px; padding:1rem .95rem 100px; }
        .set-fee-panel h2 { margin:0 0 1rem; color:var(--text-primary); font-size:1.15rem; }
        .set-fee-form { display:grid; gap:1rem; }
        .set-fee-field label { display:block; margin-bottom:.45rem; color:var(--text-secondary); font-size:.85rem; font-weight:800; }
        .set-fee-field input, .set-fee-field select { width:100%; min-height:42px; border:1px solid var(--border-color); border-radius:8px; padding:.55rem .7rem; font:inherit; background:#fff; }
        .set-fee-actions { display:flex; gap:.75rem; flex-wrap:wrap; }
        .set-fee-pills { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:1rem; }
        .set-fee-pill { display:inline-flex; align-items:center; border-radius:999px; padding:.36rem .7rem; background:#ecfeff; color:#155e75; font-size:.82rem; font-weight:800; }
        #classFeeHistoryWrap { min-width:0; overflow-x:auto; width:100%; padding-bottom:.35rem; }
        .history-table { width:100%; min-width:780px; border-collapse:collapse; table-layout:fixed; }
        .history-table th, .history-table td { padding:.7rem .65rem; border-bottom:1px solid var(--border-color); text-align:left; vertical-align:middle; line-height:1.25; word-break:normal; overflow-wrap:break-word; }
        .history-table th { background:#f8fafc; color:var(--text-secondary); font-size:.7rem; text-transform:uppercase; letter-spacing:.02em; white-space:nowrap; }
        .history-table td { font-size:.78rem; }
        .history-table th:nth-child(1), .history-table td:nth-child(1) { width:74px; white-space:nowrap; }
        .history-table th:nth-child(2), .history-table td:nth-child(2) { width:88px; white-space:nowrap; }
        .history-table th:nth-child(3), .history-table td:nth-child(3) { width:104px; white-space:nowrap; }
        .history-table th:nth-child(4), .history-table td:nth-child(4) { width:92px; }
        .history-table th:nth-child(5), .history-table td:nth-child(5) { width:104px; }
        .history-table th:nth-child(6), .history-table td:nth-child(6) { width:112px; white-space:nowrap; }
        .history-table th:nth-child(7), .history-table td:nth-child(7) { width:122px; white-space:nowrap; }
        .history-table th:nth-child(8), .history-table td:nth-child(8) { width:118px; text-align:right; white-space:nowrap; }
        .history-actions { display:flex; justify-content:flex-end; }
        .history-actions .table-action-select { width:102px; min-width:102px; min-height:36px; padding:.42rem .45rem; }
        .empty-history { padding:1rem; border:1px dashed var(--border-color); border-radius:8px; color:var(--text-secondary); background:#f8fafc; }
        @media (max-width:1100px){
            .set-fee-layout{ grid-template-columns:1fr; }
        }
        @media (max-width:720px){
            .fee-history-panel { padding:1rem .8rem 100px; }
            .history-table { min-width:780px; }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-section"><img class="sidebar-logo-img" src="images/logo.png" alt="PESS JAND logo"></div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
                <a href="students.html" class="nav-item"><i data-lucide="users"></i><span>Students</span></a>
                <a href="classes.html" class="nav-item"><i data-lucide="school"></i><span>Classes</span></a>
                <a href="set_fee.html" class="nav-item active"><i data-lucide="badge-dollar-sign"></i><span>Set Fees</span></a>
                <a href="fees.html" class="nav-item"><i data-lucide="credit-card"></i><span>Fees</span></a>
                <a href="fee_challan.html" class="nav-item"><i data-lucide="file-text"></i><span>Fee Challan</span></a>
            </nav>
            <a href="settings.html" class="user-profile"><div class="avatar">AD</div><div class="user-info"><h4>Admin User</h4><p>Admin</p></div></a>
        </aside>

        <main class="main-content">
            <header class="header">
                <div>
                    <h1>Set Fee</h1>
                    <p style="color:var(--text-secondary); margin-top:.3rem;">Set class fee by month and year, and review fee history.</p>
                </div>
            </header>

            <section class="set-fee-layout">
                <div class="set-fee-panel fee-history-panel">
                    <h2>Class Fee Setup</h2>
                    <form id="classFeeForm" class="set-fee-form">
                        <div class="set-fee-field">
                            <label for="classFeeClassSelect">Class</label>
                            <select id="classFeeClassSelect" required></select>
                        </div>
                        <div class="set-fee-field">
                            <label for="classFeeAmount">Monthly Fee (PKR)</label>
                            <input type="number" id="classFeeAmount" placeholder="e.g. 5000" min="0">
                        </div>
                        <div class="set-fee-field">
                            <label for="classAnnualCharges">Annual Charges (PKR)</label>
                            <input type="number" id="classAnnualCharges" placeholder="e.g. 12000" min="0">
                        </div>
                        <div class="set-fee-field">
                            <label for="classFeeFrequency">Frequency</label>
                            <select id="classFeeFrequency">
                                <option value="Monthly">Monthly</option>
                                <option value="Yearly">Yearly</option>
                            </select>
                        </div>
                        <div class="set-fee-field">
                            <label for="classFeeMonth">Month</label>
                            <select id="classFeeMonth"></select>
                        </div>
                        <div class="set-fee-field">
                            <label for="classFeeYear">Year</label>
                            <input type="number" id="classFeeYear" min="2000" max="2100">
                        </div>
                        <div class="set-fee-actions">
                            <button class="btn btn-primary" type="submit" id="classFeeSaveButton"><i data-lucide="save"></i> Save Fee</button>
                            <button class="btn btn-outline" type="button" id="classFeeCancelEditButton" style="display:none;">Cancel Edit</button>
                        </div>
                    </form>
                    <div id="classFeeList" class="set-fee-pills"></div>
                </div>

                <div class="set-fee-panel">
                    <h2>Fee History</h2>
                    <div id="classFeeHistoryWrap"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="auth.js?v=20260520-sidebar-requested-order"></script>
    <script src="script.js?v=20260705-class-fee-sync"></script>
    <script>
        const FEE_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        function initSetFeePage() {
            const monthSelect = document.getElementById('classFeeMonth');
            if (monthSelect) {
                monthSelect.innerHTML = FEE_MONTHS.map((month) => `<option value="${month}">${month}</option>`).join('');
                monthSelect.value = FEE_MONTHS[new Date().getMonth()];
            }
            const yearInput = document.getElementById('classFeeYear');
            if (yearInput) yearInput.value = String(new Date().getFullYear());
            if (typeof setupClassFeeSettings === 'function') setupClassFeeSettings();
            renderClassFeeHistory();
        }
        document.addEventListener('DOMContentLoaded', initSetFeePage);
        if (window.lucide) window.lucide.createIcons();
    </script>
</body>

</html>
