<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Contracts - PESS JAND</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="style.css?v=20260603-kids-roots-jand-brand">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .facility-layout{display:grid;grid-template-columns:minmax(320px,.85fr) minmax(520px,1.15fr);gap:1.25rem;align-items:start}.panel{background:#fff;border:1px solid var(--border-color);border-radius:8px;padding:1.1rem;box-shadow:var(--shadow-sm)}.panel h2{margin:0 0 .8rem;font-size:1.05rem}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.85rem}.field.full{grid-column:1/-1}.field label{display:block;margin-bottom:.35rem;color:var(--text-secondary);font-size:.78rem;font-weight:800;text-transform:uppercase}.field input,.field select,.field textarea{width:100%;min-height:42px;border:1px solid var(--border-color);border-radius:8px;padding:.65rem .75rem;font:inherit}.field textarea{min-height:82px;resize:vertical}.actions{display:flex;gap:.65rem;margin-top:1rem;flex-wrap:wrap}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1rem}.stat{background:#f8fafc;border:1px solid var(--border-color);border-radius:8px;padding:.8rem}.stat span{font-size:.75rem;color:var(--text-secondary);font-weight:800;text-transform:uppercase}.stat strong{display:block;margin-top:.25rem;font-size:1.3rem}.toolbar{display:flex;gap:.75rem;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap}.table-wrap{overflow:auto;border:1px solid var(--border-color);border-radius:8px}table.facility{width:100%;border-collapse:collapse;min-width:920px}table.facility th,table.facility td{padding:.7rem;border-bottom:1px solid var(--border-color);text-align:left;vertical-align:top;font-size:.86rem}table.facility th{background:#f8fbff;color:var(--text-secondary);font-size:.75rem;text-transform:uppercase}.meta{display:grid;gap:.18rem}.muted{color:var(--text-secondary);font-size:.78rem}.pill{display:inline-flex;padding:.28rem .55rem;border-radius:999px;font-size:.75rem;font-weight:800}.pill.active{background:#dcfce7;color:#166534}.pill.pending{background:#fef3c7;color:#92400e}.pill.expired,.pill.inactive{background:#fee2e2;color:#991b1b}.row-actions{display:flex;gap:.45rem;flex-wrap:wrap}.mini{border:1px solid var(--border-color);border-radius:8px;background:#fff;padding:.42rem .6rem;cursor:pointer;font-weight:800;font-size:.76rem}.mini.danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}@media(max-width:1050px){.facility-layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.grid,.stats{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="dashboard-container">
<aside class="sidebar"><div class="logo-section"><img class="sidebar-logo-img" src="images/logo.png" alt="PESS JAND logo"></div><nav class="nav-links">
<a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a><a href="students.html" class="nav-item"><i data-lucide="users"></i><span>Students</span></a><a href="classes.html" class="nav-item"><i data-lucide="school"></i><span>Classes</span></a><a href="cafe.html" class="nav-item active"><i data-lucide="coffee"></i><span>Cafe</span></a><a href="transport.html" class="nav-item"><i data-lucide="bus"></i><span>Transport</span></a><a href="fees.html" class="nav-item"><i data-lucide="credit-card"></i><span>Fees</span></a><a href="permissions.html" class="nav-item"><i data-lucide="shield"></i><span>Permissions</span></a><a href="#" class="nav-item" onclick="logoutUser(event)"><i data-lucide="log-out"></i><span>Logout</span></a>
</nav><a href="settings.html" class="user-profile"><div class="avatar">AD</div><div class="user-info"><h4>Admin User</h4><p>Principal</p></div></a></aside>
<main class="main-content">
<header class="header"><div><h1>Cafe Contracts</h1><p style="color:var(--text-secondary);margin-top:.25rem">Track cafe contractor, contract period, rent, hygiene, menu, and payment status.</p></div></header>
<section class="facility-layout">
<div class="panel"><h2 id="formTitle">Cafe Contract</h2><form id="cafeForm"><input type="hidden" id="recordId"><div class="grid">
<div class="field"><label>Contractor Name</label><input id="contractorName" required></div><div class="field"><label>Company / Stall</label><input id="companyName"></div>
<div class="field"><label>Contact Number</label><input id="contactNumber"></div><div class="field"><label>CNIC</label><input id="cnic"></div>
<div class="field"><label>Email</label><input id="email" type="email"></div><div class="field"><label>Contract Type</label><select id="contractType"><option>Cafe Operations</option><option>Snack Counter</option><option>Lunch Supply</option><option>Juice / Drinks</option></select></div>
<div class="field"><label>Start Date</label><input id="startDate" type="date"></div><div class="field"><label>End Date</label><input id="endDate" type="date"></div>
<div class="field"><label>Monthly Rent (PKR)</label><input id="monthlyRent" type="number" min="0"></div><div class="field"><label>Security Deposit (PKR)</label><input id="securityDeposit" type="number" min="0"></div>
<div class="field"><label>Payment Status</label><select id="paymentStatus"><option>Paid</option><option>Pending</option><option>Partial</option></select></div><div class="field"><label>Hygiene Status</label><select id="hygieneStatus"><option>Excellent</option><option>Good</option><option>Needs Check</option><option>Poor</option></select></div>
<div class="field"><label>License Number</label><input id="licenseNumber"></div><div class="field"><label>Staff Count</label><input id="staffCount" type="number" min="0"></div>
<div class="field"><label>Status</label><select id="status"><option>Active</option><option>Pending</option><option>Expired</option><option>Inactive</option></select></div>
<div class="field full"><label>Menu / Items</label><textarea id="menuItems" placeholder="Samosa, burger, lunch boxes, drinks..."></textarea></div><div class="field full"><label>Notes</label><textarea id="notes"></textarea></div>
</div><div class="actions"><button class="btn btn-primary" type="submit"><i data-lucide="save"></i> Save Contract</button><button class="btn btn-outline" type="button" onclick="resetForm()">Clear</button></div></form></div>
<div class="panel"><div class="stats"><div class="stat"><span>Total</span><strong id="total">0</strong></div><div class="stat"><span>Active</span><strong id="active">0</strong></div><div class="stat"><span>Pending Rent</span><strong id="pending">0</strong></div><div class="stat"><span>Rent</span><strong id="rent">0</strong></div></div><div class="toolbar"><div class="search-bar"><i data-lucide="search" size="18"></i><input id="search" placeholder="Search cafe contract..."></div><button class="btn btn-outline" onclick="loadContracts()"><i data-lucide="refresh-cw"></i> Refresh</button></div><div class="table-wrap"><table class="facility"><thead><tr><th>Contractor</th><th>Contract</th><th>Financial</th><th>Operations</th><th>Status</th><th>Actions</th></tr></thead><tbody id="body"></tbody></table></div></div>
</section></main></div>
<script src="auth.js?v=20260520-sidebar-requested-order"></script><script src="script.js?v=20260520-sidebar-classes-restore"></script>
<script>
let records=[];const fields=['contractorName','companyName','contactNumber','cnic','email','contractType','startDate','endDate','monthlyRent','securityDeposit','paymentStatus','menuItems','hygieneStatus','licenseNumber','staffCount','status','notes'];
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
async function loadContracts(){try{const r=await fetch(`${API_BASE_URL}/cafe/contracts`);const j=await parseJsonResponse(r,'Cafe records unavailable.');records=j.contracts||[]}catch(e){records=JSON.parse(localStorage.getItem('cafe_contracts')||'[]')}localStorage.setItem('cafe_contracts',JSON.stringify(records));render()}
function payload(){const p={id:recordId.value||undefined};fields.forEach(f=>p[f]=document.getElementById(f).value);return p}
async function save(e){e.preventDefault();try{const r=await fetch(`${API_BASE_URL}/cafe/contracts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});const j=await parseJsonResponse(r,'Cafe contract could not be saved.');if(!r.ok||j.success===false)throw Error(j.message);records=j.contracts||[];resetForm();render();alert('Cafe contract saved.')}catch(err){alert(err.message||err)}}
function render(){const term=(search.value||'').toLowerCase();const rows=records.filter(x=>`${x.contractorName} ${x.companyName} ${x.contactNumber} ${x.contractType}`.toLowerCase().includes(term));total.textContent=records.length;active.textContent=records.filter(x=>x.status==='Active').length;pending.textContent=records.filter(x=>x.paymentStatus==='Pending').length;rent.textContent='PKR '+records.reduce((s,x)=>s+Number(x.monthlyRent||0),0).toLocaleString('en-PK');body.innerHTML=rows.length?rows.map(x=>`<tr><td><div class="meta"><strong>${esc(x.contractorName)}</strong><span class="muted">${esc(x.companyName||'-')} | ${esc(x.contactNumber||'-')}</span><span class="muted">${esc(x.cnic||'-')} | ${esc(x.email||'-')}</span></div></td><td>${esc(x.contractType||'-')}<br><span class="muted">${esc(x.startDate||'-')} to ${esc(x.endDate||'-')}</span></td><td>Rent: <strong>PKR ${Number(x.monthlyRent||0).toLocaleString('en-PK')}</strong><br><span class="muted">Deposit: PKR ${Number(x.securityDeposit||0).toLocaleString('en-PK')} | ${esc(x.paymentStatus||'-')}</span></td><td>${esc(x.hygieneStatus||'-')}<br><span class="muted">License: ${esc(x.licenseNumber||'-')} | Staff: ${esc(x.staffCount||0)}</span><br><span class="muted">${esc(x.menuItems||'')}</span></td><td><span class="pill ${(x.status||'').toLowerCase()}">${esc(x.status||'-')}</span></td><td><div class="row-actions"><button class="mini" onclick="editRec('${x.id}')">Edit</button><button class="mini danger" onclick="delRec('${x.id}')">Delete</button></div></td></tr>`).join(''):'<tr><td colspan="6">No cafe contracts found.</td></tr>';lucide.createIcons()}
function editRec(id){const x=records.find(r=>r.id===id);if(!x)return;recordId.value=x.id;fields.forEach(f=>document.getElementById(f).value=x[f]||'');formTitle.textContent='Edit Cafe Contract';scrollTo({top:0,behavior:'smooth'})}
async function delRec(id){if(!(await showAppConfirm('Delete this cafe contract?')))return;const r=await fetch(`${API_BASE_URL}/cafe/contracts/${encodeURIComponent(id)}`,{method:'DELETE'});const j=await parseJsonResponse(r,'Delete failed.');records=j.contracts||[];render()}
function resetForm(){cafeForm.reset();recordId.value='';formTitle.textContent='Cafe Contract';status.value='Active';paymentStatus.value='Pending';hygieneStatus.value='Good'}
cafeForm.addEventListener('submit',save);search.addEventListener('input',render);document.addEventListener('DOMContentLoaded',()=>{resetForm();loadContracts();lucide.createIcons()});
</script></body></html>
