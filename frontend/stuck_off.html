<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stuck Off - PESS JAND</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="style.css?v=20260603-kids-roots-jand-brand">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .stuck-off-header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: end;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
        }

        .stuck-off-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(150px, 1fr));
            gap: 0.85rem;
            margin-bottom: 1.25rem;
        }

        .stuck-off-stat {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            box-shadow: var(--shadow-sm);
        }

        .stuck-off-stat span {
            color: var(--text-secondary);
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .stuck-off-stat strong {
            display: block;
            margin-top: 0.35rem;
            color: var(--text-primary);
            font-size: 1.45rem;
        }

        .stuck-off-toolbar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .stuck-off-toolbar input,
        .stuck-off-toolbar select {
            min-height: 42px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.7rem 0.9rem;
            background: #fff;
            color: var(--text-primary);
        }

        .stuck-off-toolbar input {
            flex: 1 1 280px;
        }

        .stuck-off-toolbar select {
            flex: 0 0 180px;
        }

        .record-type-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 74px;
            padding: 0.32rem 0.6rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 800;
            background: rgba(32, 176, 164, 0.12);
            color: var(--primary-color);
        }

        .record-type-pill.teacher {
            background: rgba(59, 130, 246, 0.12);
            color: #2563eb;
        }

        .muted-text {
            color: var(--text-secondary);
            font-size: 0.78rem;
        }

        #stuckOffEmptyState {
            width: 100%;
            padding: 1rem;
            text-align: center;
            color: var(--text-secondary);
        }

        @media (max-width: 760px) {
            .stuck-off-stats {
                grid-template-columns: 1fr;
            }

            .stuck-off-toolbar select {
                flex-basis: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <i data-lucide="graduation-cap"></i>
                <span>PESS JAND</span>
            </div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
                <a href="students.html" class="nav-item"><i data-lucide="users"></i><span>Students</span></a>
                <a href="teachers.html" class="nav-item"><i data-lucide="book-open"></i><span>Teachers</span></a>
                <a href="stuck_off.html" class="nav-item active"><i data-lucide="user-x"></i><span>Stuck of students</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="stuck-off-header">
                <div>
                    <h1>Stuck Off</h1>
                    <p class="page-subtitle">Students aur teachers jo stuck-off mark kiye gaye hain.</p>
                </div>
            </div>

            <section class="stuck-off-stats">
                <div class="stuck-off-stat">
                    <span>Total Records</span>
                    <strong id="stuckOffTotalCount">0</strong>
                </div>
                <div class="stuck-off-stat">
                    <span>Students</span>
                    <strong id="stuckOffStudentCount">0</strong>
                </div>
                <div class="stuck-off-stat">
                    <span>Teachers</span>
                    <strong id="stuckOffTeacherCount">0</strong>
                </div>
            </section>

            <section class="table-container">
                <div class="stuck-off-toolbar">
                    <input id="stuckOffSearchInput" type="search" placeholder="Search by name, code, class, subject, or campus">
                    <select id="stuckOffTypeFilter">
                        <option value="all">All Records</option>
                        <option value="students">Students</option>
                        <option value="teachers">Teachers</option>
                    </select>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Name</th>
                                <th>Class / Subject</th>
                                <th>Campus</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Note</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="stuckOffRecordsBody"></tbody>
                    </table>
                </div>
                <div id="stuckOffEmptyState" class="no-data-message">No stuck-off records found.</div>
            </section>
        </main>
    </div>

    <script src="auth.js?v=20260520-sidebar-requested-order"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js?v=20260520-sidebar-classes-restore"></script>
</body>
</html>
