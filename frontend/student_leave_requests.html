<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Leave Requests - PESS JAND</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="style.css?v=20260603-kids-roots-jand-brand">
    <link rel="stylesheet" href="student_schedule_theme.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .schedule-panel { background:#fff; border:1px solid #cfe8e5; border-radius:16px; padding:1.1rem; margin-bottom:1.25rem; box-shadow:0 12px 30px rgba(15,23,42,.07); }
        .schedule-table { width:100%; border-collapse:collapse; }
        .schedule-table th,.schedule-table td { border-bottom:1px solid #dbecea; padding:.55rem .7rem; text-align:left; vertical-align:middle; font-size:.86rem; line-height:1.25; }
        .schedule-table th { background:#f6fbfa; color:#475569; font-size:.74rem; text-transform:uppercase; }
        .schedule-table th.status-col,
        .schedule-table td.status-col { width:78px; white-space:nowrap; text-align:center; padding-left:.4rem; padding-right:.4rem; }
        .schedule-table th.action-col,
        .schedule-table td.action-col { width:112px; white-space:nowrap; text-align:right; padding-left:.4rem; padding-right:.45rem; }
        .schedule-table-wrap { overflow-x:auto; }
        .panel-title { margin:0 0 .8rem; color:#0f172a; font-size:1.02rem; }
        .history-note { margin:.25rem 0 0; color:#64748b; font-size:.78rem; font-weight:700; }
        .empty-note { padding:.8rem; border:1px dashed #cbd5e1; border-radius:12px; color:var(--text-secondary); background:#f8fafc; }
        .schedule-actions { display:inline-flex; gap:.3rem; flex-wrap:nowrap; align-items:center; justify-content:flex-end; }
        .schedule-action-btn { min-height:24px; border:0; border-radius:6px; padding:.22rem .42rem; font-size:.72rem; font-weight:800; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:.2rem; line-height:1; white-space:nowrap; }
        .schedule-action-btn i { width:11px; height:11px; flex:0 0 11px; }
        .schedule-action-btn.edit { background:#dcfce7; color:#166534; }
        .schedule-action-btn.delete { background:#fee2e2; color:#b91c1c; }
        .schedule-action-btn.pdf { background:#e0f2fe; color:#0369a1; }
        .schedule-action-select { width:100px; min-height:30px; border:1px solid #cfe8e5; border-radius:7px; background:#fff; color:#0f766e; font-size:.75rem; font-weight:800; padding:.28rem .45rem; cursor:pointer; outline:none; }
        .schedule-action-select:focus { border-color:#0f766e; box-shadow:0 0 0 3px rgba(15,118,110,.12); }
        .status-pill { display:inline-flex; align-items:center; justify-content:center; min-width:58px; border-radius:999px; padding:.16rem .42rem; font-size:.68rem; font-weight:800; line-height:1.1; white-space:nowrap; }
        .status-pill.pending { background:#fef3c7; color:#92400e; }
        .status-pill.approved { background:#dcfce7; color:#166534; }
        .status-pill.rejected { background:#fee2e2; color:#991b1b; }
        .back-link { display:inline-flex; align-items:center; gap:.45rem; margin-bottom:1rem; color:#0f766e; font-weight:800; text-decoration:none; }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-section"><img class="sidebar-logo-img" src="images/logo.png" alt="PESS JAND logo"></div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
                <a href="students.html" class="nav-item"><i data-lucide="users"></i><span>Students</span></a>
                <a href="teachers.html" class="nav-item"><i data-lucide="book-open"></i><span>Teachers</span></a>
                <a href="classes.html" class="nav-item"><i data-lucide="school"></i><span>Classes</span></a>
                <a href="#" class="nav-item" onclick="logoutUser(event)"><i data-lucide="log-out"></i><span>Logout</span></a>
            </nav>
            <a href="settings.html" class="user-profile"><div class="avatar">AD</div><div class="user-info"><h4>Admin User</h4><p>Admin</p></div></a>
        </aside>
        <main class="main-content">
            <a class="back-link" href="notifications.html"><i data-lucide="arrow-left"></i> Back to Notifications</a>
            <header class="header"><div><h1>Student Leave Requests</h1><p style="color:var(--text-secondary); margin-top:.3rem;">Approve or reject leave applications submitted from student portal.</p></div></header>
            <section class="schedule-panel"><h2 class="panel-title">Pending Student Leaves</h2><div id="studentLeaveRequestList"></div></section>
            <section class="schedule-panel"><h2 class="panel-title">Student Leave History</h2><div id="studentLeaveHistoryList"></div></section>
        </main>
    </div>
    <div id="successModal" class="success-overlay"><div class="success-modal"><div class="success-icon-wrap"><i data-lucide="check-circle"></i></div><h2 id="successTitle">Success!</h2><p id="successMessage" style="color:var(--text-secondary); margin:1rem 0 2rem;"></p><button class="btn btn-primary" style="width:100%;" onclick="closeSuccessModal()">Great!</button></div></div>
    <script src="auth.js?v=20260520-sidebar-requested-order"></script>
    <script src="script.js?v=20260520-sidebar-classes-restore"></script>
    <script>
        const STUDENT_LEAVE_KEY = 'eduCore_student_leave_requests';
        const LEAVE_API_BASE = (() => {
            const local = ['localhost', '127.0.0.1'].includes(window.location.hostname) || window.location.protocol === 'file:';
            const backend = local ? (window.location.protocol === 'file:' ? 'http://localhost:3000' : window.location.origin) : (window.ENV_BACKEND_URL || window.location.origin);
            return `${backend}/api`;
        })();
        const LEAVE_AUTH_TOKEN = sessionStorage.getItem('eduCore_token') || '';
        let studentLeaveRequests = null;
        function cachedData() { try { return JSON.parse(localStorage.getItem(STUDENT_LEAVE_KEY) || '[]'); } catch (_e) { return []; } }
        function mergeLeaveRequests(remote = [], cached = []) {
            const rows = new Map();
            [...cached, ...remote].forEach((item) => {
                if (!item?.id) return;
                rows.set(String(item.id), { ...(rows.get(String(item.id)) || {}), ...item });
            });
            return Array.from(rows.values());
        }
        function data() { return Array.isArray(studentLeaveRequests) ? studentLeaveRequests : cachedData(); }
        function cache(value) { localStorage.setItem(STUDENT_LEAVE_KEY, JSON.stringify(value)); }
        function esc(value) { return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[char])); }
        function formatLeaveDate(value) {
            if (!value) return '-';
            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) return value;
            return parsed.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }
        function formatLeaveDateTime(value) {
            if (!value) return '-';
            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) return value;
            return parsed.toLocaleString('en-GB', {
                day: '2-digit',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        function reviewActionButtons(item) {
            const idArg = esc(JSON.stringify(String(item.id || '')));
            const status = String(item.status || 'Pending').toLowerCase();
            return `<select class="schedule-action-select" onchange="handleReviewActionSelect(this, ${idArg})" aria-label="Update leave status">
                <option value="">Action</option>
                ${status !== 'approved' ? '<option value="Approved">Approve</option>' : ''}
                ${status !== 'rejected' ? '<option value="Rejected">Reject</option>' : ''}
            </select>`;
        }
        function handleReviewActionSelect(select, id) {
            const nextStatus = select.value;
            select.value = '';
            if (!nextStatus) return;
            updateStatus(id, nextStatus);
        }
        function buildLeavePdfHtml(item) {
            const status = esc(item.status || 'Pending');
            return `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave Application</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <style>
        @page { margin: 16mm; }
        body { margin: 0; font-family: Arial, sans-serif; color: #0f172a; background: #ffffff; }
        .page { width: min(780px, calc(100% - 40px)); margin: 24px auto; }
        .header { display: grid; grid-template-columns: 118px 1fr; align-items: center; gap: 16px; border-bottom: 2px solid #0f766e; padding-bottom: 14px; margin-bottom: 22px; }
        .logo { width: 108px; object-fit: contain; }
        h1 { margin: 0; color: #0f766e; font-size: 25px; }
        .subtitle { margin-top: 6px; color: #475569; font-size: 13px; }
        .meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 28px; margin-bottom: 24px; }
        .meta div { border-bottom: 1px solid #d9ece9; padding: 0 0 9px; }
        .meta strong { display: block; color: #475569; font-size: 12px; margin-bottom: 5px; text-transform: uppercase; }
        .reason { margin-top: 8px; }
        .reason h2 { margin: 0 0 10px; color: #0f172a; font-size: 17px; }
        .reason-box { min-height: 150px; line-height: 1.65; white-space: pre-wrap; border-top: 1px solid #d9ece9; border-bottom: 1px solid #d9ece9; padding: 14px 0; }
        .signature-row { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; margin-top: 54px; }
        .signature { border-top: 1px solid #64748b; padding-top: 8px; color: #475569; font-size: 13px; text-align: center; }
        .status { display: inline-block; color: #0f766e; font-weight: 700; }
        .footer { margin-top: 30px; color: #64748b; font-size: 12px; text-align: center; }
        @media print { body { background: #fff; } .page { width: auto; margin: 0; } }
    </style>
</head>
<body>
    <main class="page">
        <header class="header">
            <img class="logo" src="images/logo.png" alt="School logo">
            <div>
                <h1>Leave Application</h1>
                <div class="subtitle">Student leave request generated from EduCore</div>
            </div>
        </header>
        <section class="meta">
            <div><strong>Student Name</strong>${esc(item.applicantName || item.studentName || '-')}</div>
            <div><strong>Roll No</strong>${esc(item.rollNo || '-')}</div>
            <div><strong>Class</strong>${esc(item.classGrade || '-')}</div>
            <div><strong>Status</strong><span class="status">${status}</span></div>
            <div><strong>From Date</strong>${esc(formatLeaveDate(item.fromDate))}</div>
            <div><strong>To Date</strong>${esc(formatLeaveDate(item.toDate))}</div>
        </section>
        <section class="reason">
            <h2>Reason</h2>
            <div class="reason-box">${esc(item.reason || '-')}</div>
        </section>
        <section class="signature-row">
            <div class="signature">Student / Parent Signature</div>
            <div class="signature">School Approval Signature</div>
        </section>
        <div class="footer">PESS JAND</div>
    </main>
</body>
</html>`;
        }
        function downloadLeavePdf(id) {
            const item = data().find((entry) => entry.id === id);
            if (!item) {
                showAppAlert('Leave request was not found.', 'Download Failed');
                return;
            }
            const printable = window.open('', '_blank');
            if (!printable) {
                showAppAlert('Please allow pop-ups to download the leave PDF.', 'Download Blocked');
                return;
            }
            printable.document.write(buildLeavePdfHtml(item));
            printable.document.close();
            printable.focus();
            printable.setTimeout(() => printable.print(), 450);
        }
        function downloadLeaveAttachment(id) {
            const item = data().find((entry) => entry.id === id);
            if (!item?.fileData) {
                showAppAlert('Leave attachment was not found.', 'Download Failed');
                return;
            }
            const link = document.createElement('a');
            link.href = item.fileData;
            link.download = item.fileName || 'leave-attachment';
            document.body.appendChild(link);
            link.click();
            link.remove();
        }
        function leaveAttachmentButton(item) {
            if (!item?.fileData) return '';
            return `<button class="schedule-action-btn pdf" onclick="downloadLeaveAttachment('${esc(item.id)}')"><i data-lucide="paperclip" width="11"></i> ${esc(item.fileName || 'Attachment')}</button>`;
        }
        function render() {
            const host = document.getElementById('studentLeaveRequestList');
            const historyHost = document.getElementById('studentLeaveHistoryList');
            if (!host || !historyHost) return;
            const requests = [...data()].sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
            const pending = requests.filter((item) => String(item.status || 'Pending').toLowerCase() === 'pending');
            if (!pending.length) {
                host.innerHTML = '<div class="empty-note">No pending student leave request.</div>';
            } else {
                host.innerHTML = `<div class="schedule-table-wrap"><table class="schedule-table"><thead><tr><th>Student</th><th>Class</th><th>Roll</th><th>Leave Dates</th><th>Applied</th><th>Reason</th><th class="status-col">Status</th><th class="action-col">Actions</th></tr></thead><tbody>${pending.map((item) => { const status = String(item.status || 'Pending').toLowerCase(); return `<tr><td>${esc(item.applicantName || item.studentName || '-')}</td><td>${esc(item.classGrade || '-')}</td><td>${esc(item.rollNo || '-')}</td><td>${esc(item.fromDate || '-')} to ${esc(item.toDate || '-')}</td><td>${esc(formatLeaveDateTime(item.createdAt))}</td><td>${esc(item.reason || '-')}<div class="history-note"><button class="schedule-action-btn pdf" onclick="downloadLeavePdf('${item.id}')"><i data-lucide="download" width="11"></i> PDF</button>${leaveAttachmentButton(item)}</div></td><td class="status-col"><span class="status-pill ${status}">${esc(item.status || 'Pending')}</span></td><td class="action-col">${reviewActionButtons(item)}</td></tr>`; }).join('')}</tbody></table></div>`;
            }
            if (!requests.length) {
                historyHost.innerHTML = '<div class="empty-note">No student leave history yet.</div>';
            } else {
                historyHost.innerHTML = `<div class="schedule-table-wrap"><table class="schedule-table"><thead><tr><th>Student</th><th>Leave Dates</th><th>Applied At</th><th>Reason</th><th>Review</th><th class="action-col">Update Status</th></tr></thead><tbody>${requests.map((item) => { const status = String(item.status || 'Pending').toLowerCase(); return `<tr><td>${esc(item.applicantName || item.studentName || '-')}<div class="history-note">Class: ${esc(item.classGrade || '-')} | Roll: ${esc(item.rollNo || '-')}</div></td><td>${esc(item.fromDate || '-')} to ${esc(item.toDate || '-')}</td><td>${esc(formatLeaveDateTime(item.createdAt))}</td><td>${esc(item.reason || '-')}<div class="history-note">${leaveAttachmentButton(item)}</div></td><td><span class="status-pill ${status}">${esc(item.status || 'Pending')}</span><div class="history-note">Reviewed: ${esc(formatLeaveDateTime(item.reviewedAt))}</div>${item.reviewReason ? `<div class="history-note" style="color:#991b1b;">Reject reason: ${esc(item.reviewReason)}</div>` : ''}</td><td class="action-col">${reviewActionButtons(item)}</td></tr>`; }).join('')}</tbody></table></div>`;
            }
            if (window.lucide) window.lucide.createIcons();
        }
        async function loadLeaveRequests() {
            try {
                const response = await fetch(`${LEAVE_API_BASE}/leave-requests?role=Student`, {
                    headers: { Authorization: `Bearer ${LEAVE_AUTH_TOKEN}` }
                });
                const result = await response.json().catch(() => ({}));
                if (!response.ok || !result?.success) throw new Error(result?.message || 'Student leave requests could not be loaded.');
                studentLeaveRequests = mergeLeaveRequests(result.leaveRequests || [], cachedData());
                cache(studentLeaveRequests);
            } catch (error) {
                studentLeaveRequests = cachedData();
                showAppAlert(error.message || 'Student leave requests could not be loaded.', 'Leave Load Failed');
            }
            render();
        }
        async function deleteLeaveRequest(id) {
            const confirmed = await showAppConfirm('Delete this leave request permanently?', 'Delete Leave');
            if (!confirmed) return;
            try {
                const response = await fetch(`${LEAVE_API_BASE}/leave-requests/${encodeURIComponent(id)}`, {
                    method: 'DELETE',
                    headers: { Authorization: `Bearer ${LEAVE_AUTH_TOKEN}` }
                });
                const result = await response.json().catch(() => ({}));
                if (!response.ok || !result?.success) throw new Error(result?.message || 'Leave request could not be deleted.');
            } catch (error) {
                showAppAlert(error.message || 'Leave request could not be deleted.', 'Delete Failed');
                return;
            }
            studentLeaveRequests = data().filter((item) => item.id !== id);
            cache(studentLeaveRequests);
            render();
            showSuccessModal('Leave Deleted!', 'Leave request has been deleted.');
        }
        function emailStatusText(emailResult) {
            if (emailResult?.skipped) return ` Email skipped: ${emailResult.reason}`;
            if (emailResult?.success === false) return ` Status saved, but email failed: ${emailResult.message}`;
            return ' Status email sent.';
        }
        function getLeaveDateRange(fromDate, toDate) {
            const start = new Date(`${fromDate}T00:00:00`);
            const end = new Date(`${toDate || fromDate}T00:00:00`);
            if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime()) || end < start) return [];
            const dates = [];
            const cursor = new Date(start);
            while (cursor <= end) {
                dates.push(cursor.toISOString().slice(0, 10));
                cursor.setDate(cursor.getDate() + 1);
            }
            return dates;
        }
        async function markApprovedStudentLeaveAttendance(leaveRequest) {
            const studentId = String(leaveRequest?.applicantId || '').trim();
            const dates = getLeaveDateRange(leaveRequest?.fromDate, leaveRequest?.toDate);
            if (!studentId || !dates.length) return { success: false, message: 'Student or leave dates are missing.' };

            const store = JSON.parse(localStorage.getItem('eduCore_student_attendance') || '{}');
            const records = Array.isArray(store[studentId]) ? store[studentId] : [];
            store[studentId] = records
                .filter((item) => !dates.includes(item.date))
                .concat(dates.map((date) => ({ date, status: 'Leave' })))
                .sort((a, b) => String(a.date).localeCompare(String(b.date)));
            localStorage.setItem('eduCore_student_attendance', JSON.stringify(store));

            let failed = 0;
            for (const date of dates) {
                const result = await saveStudentAttendanceToSQLRecord(studentId, date, 'Leave');
                if (!result.success) failed += 1;
            }
            return failed
                ? { success: false, message: `Leave approved, but attendance sync failed for ${failed} day(s).` }
                : { success: true, message: `Attendance marked as Leave for ${dates.length} day(s).` };
        }
        async function updateStatus(id, status) {
            try {
                const reviewReason = status === 'Rejected' ? String(window.prompt('Write rejection reason') || '').trim() : '';
                if (status === 'Rejected' && !reviewReason) {
                    showAppAlert('Rejection reason is required.', 'Reason Required');
                    return;
                }
                const response = await fetch(`${LEAVE_API_BASE}/leave-requests/${encodeURIComponent(id)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${LEAVE_AUTH_TOKEN}`
                    },
                    body: JSON.stringify({ status, reviewReason })
                });
                const result = await response.json().catch(() => ({}));
                if (!response.ok || !result?.success) throw new Error(result?.message || 'Leave status could not be updated.');
                studentLeaveRequests = data().map((item) => item.id === id ? result.leaveRequest : item);
                cache(studentLeaveRequests);
                const attendanceResult = status === 'Approved'
                    ? await markApprovedStudentLeaveAttendance(result.leaveRequest)
                    : null;
                render();
                showSuccessModal(`Leave ${status}!`, `Student leave request has been ${status.toLowerCase()}.${emailStatusText(result.emailResult)}${attendanceResult ? ` ${attendanceResult.message}` : ''}`);
            } catch (error) {
                showAppAlert(error.message || 'Leave status could not be updated.', 'Review Failed');
            }
        }
        render();
        loadLeaveRequests();
        if (window.lucide) window.lucide.createIcons();
    </script>
</body>

</html>
