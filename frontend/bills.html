<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bills - PESS JAND</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="style.css?v=20260603-kids-roots-jand-brand">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .bill-panel { background:#fff; border:1px solid var(--border-color); border-radius:12px; padding:1.25rem; box-shadow:var(--shadow-sm); margin-bottom:1.25rem; }
        .bill-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:1rem; align-items:end; }
        .bill-panel label { display:block; color:var(--text-secondary); font-size:.82rem; font-weight:800; margin-bottom:.45rem; }
        .bill-panel input,.bill-panel select,.bill-panel textarea { width:100%; min-height:42px; border:1px solid var(--border-color); border-radius:8px; padding:.65rem .75rem; font:inherit; background:#fff; }
        .bill-panel textarea { min-height:90px; resize:vertical; }
        .bill-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1rem; margin-bottom:1.25rem; }
        .bill-stat { background:#fff; border:1px solid var(--border-color); border-radius:12px; padding:1rem; box-shadow:var(--shadow-sm); }
        .bill-stat p { margin:0 0 .35rem; color:var(--text-secondary); font-weight:800; font-size:.82rem; }
        .bill-stat h3 { margin:0; color:var(--text-primary); }
        .bill-table { width:100%; border-collapse:collapse; }
        .bill-table th,.bill-table td { padding:.8rem; border-bottom:1px solid var(--border-color); text-align:left; vertical-align:top; }
        .bill-table th { background:#f8fafc; color:var(--text-secondary); font-size:.78rem; text-transform:uppercase; }
        .bill-actions { display:inline-flex; gap:.45rem; flex-wrap:wrap; }
        .mini-btn { border:0; border-radius:8px; padding:.45rem .7rem; font-weight:800; cursor:pointer; display:inline-flex; align-items:center; gap:.35rem; }
        .mini-btn.edit { background:#dbeafe; color:#1d4ed8; }
        .mini-btn.delete { background:#fee2e2; color:#b91c1c; }
        .status-pill { display:inline-flex; border-radius:999px; padding:.25rem .6rem; font-weight:800; font-size:.78rem; }
        .status-paid { background:#dcfce7; color:#15803d; }
        .status-pending { background:#fef3c7; color:#b45309; }
        .empty-note { padding:1rem; border:1px dashed var(--border-color); border-radius:10px; color:var(--text-secondary); background:#f8fafc; }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-section"><img class="sidebar-logo-img" src="images/logo.png" alt="PESS JAND logo"></div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
                <a href="fees.html" class="nav-item"><i data-lucide="credit-card"></i><span>Fees</span></a>
                <a href="bills.html" class="nav-item active"><i data-lucide="receipt"></i><span>Bills</span></a>
                <a href="revenue.html" class="nav-item"><i data-lucide="trending-up"></i><span>Revenue</span></a>
            </nav>
            <a href="settings.html" class="user-profile"><div class="avatar">AD</div><div class="user-info"><h4>Admin User</h4><p>Admin</p></div></a>
        </aside>

        <main class="main-content">
            <header class="header">
                <div>
                    <h1>Bills</h1>
                    <p style="color:var(--text-secondary); margin-top:.3rem;">Add electricity, gas, maintenance and other school expenses.</p>
                </div>
            </header>

            <section class="bill-stats">
                <div class="bill-stat"><p>Total Bills</p><h3 id="billTotal">PKR 0</h3></div>
                <div class="bill-stat"><p>Paid Bills</p><h3 id="billPaid">PKR 0</h3></div>
                <div class="bill-stat"><p>Pending Bills</p><h3 id="billPending">PKR 0</h3></div>
            </section>

            <section class="bill-panel">
                <form id="billForm">
                    <input type="hidden" id="billId">
                    <div class="bill-grid">
                        <div>
                            <label for="billType">Bill Type</label>
                            <select id="billType" required>
                                <option value="">Select Type</option>
                                <option>Electricity</option>
                                <option>Gas</option>
                                <option>Water</option>
                                <option>Internet</option>
                                <option>Maintenance</option>
                                <option>Rent</option>
                                <option>Stationery</option>
                                <option>Transport</option>
                                <option>Other Expense</option>
                            </select>
                        </div>
                        <div>
                            <label for="billTitle">Bill / Expense Title</label>
                            <input type="text" id="billTitle" required placeholder="e.g. May electricity bill">
                        </div>
                        <div>
                            <label for="billAmount">Amount (PKR)</label>
                            <input type="number" id="billAmount" min="0" required placeholder="e.g. 25000">
                        </div>
                        <div>
                            <label for="billDate">Bill Date</label>
                            <input type="date" id="billDate" required>
                        </div>
                        <div>
                            <label for="billStatus">Status</label>
                            <select id="billStatus" required>
                                <option value="Pending">Pending</option>
                                <option value="Paid">Paid</option>
                            </select>
                        </div>
                    </div>
                    <div style="margin-top:1rem;">
                        <label for="billNotes">Notes</label>
                        <textarea id="billNotes" placeholder="Reference number, vendor, or payment details"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="billSaveBtn" style="margin-top:1rem;"><i data-lucide="save"></i> Save Bill</button>
                </form>
            </section>

            <section class="bill-panel">
                <h3 style="margin-bottom:1rem;">Bills History</h3>
                <div id="billList"></div>
            </section>
        </main>
    </div>

    <script src="auth.js?v=20260520-sidebar-requested-order"></script>
    <script src="script.js?v=20260520-sidebar-classes-restore"></script>
    <script>
        const BILL_KEY = 'eduCore_bills';
        function readBills() { try { return JSON.parse(localStorage.getItem(BILL_KEY) || '[]'); } catch (_e) { return []; } }
        function saveBills(items) { localStorage.setItem(BILL_KEY, JSON.stringify(Array.isArray(items) ? items : [])); window.dispatchEvent(new Event('storage')); }
        function esc(value) { return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[char])); }
        function money(value) { return `PKR ${Math.round(Number(value || 0)).toLocaleString('en-PK')}`; }
        function getBillSelectedCampus() {
            if (typeof getGlobalCampusFilterForCurrentUser === 'function') return getGlobalCampusFilterForCurrentUser();
            return String(localStorage.getItem('eduCore_dashboard_campus_filter') || 'all').trim() || 'all';
        }
        function billMatchesSelectedCampus(item) {
            if (typeof recordMatchesGlobalCampus === 'function') return recordMatchesGlobalCampus(item);
            const selectedCampus = getBillSelectedCampus();
            if (!selectedCampus || selectedCampus === 'all') return true;
            return String(item?.campusName || item?.branchName || item?.campus || 'Main Campus').trim().toLowerCase() === selectedCampus.toLowerCase();
        }
        function renderBills() {
            const bills = readBills().filter(billMatchesSelectedCampus).sort((a, b) => String(b.billDate || '').localeCompare(String(a.billDate || '')));
            const total = bills.reduce((sum, item) => sum + Number(item.amount || 0), 0);
            const paid = bills.filter((item) => item.status === 'Paid').reduce((sum, item) => sum + Number(item.amount || 0), 0);
            billTotal.innerText = money(total);
            billPaid.innerText = money(paid);
            billPending.innerText = money(total - paid);

            if (!bills.length) {
                billList.innerHTML = '<div class="empty-note">No bill or expense has been added yet.</div>';
                return;
            }

            billList.innerHTML = `<table class="bill-table"><thead><tr><th>Date</th><th>Type</th><th>Title</th><th>Amount</th><th>Status</th><th>Notes</th><th>Action</th></tr></thead><tbody>${bills.map((item) => `
                <tr>
                    <td>${esc(item.billDate || '-')}</td>
                    <td>${esc(item.type || '-')}</td>
                    <td><strong>${esc(item.title || '-')}</strong></td>
                    <td>${money(item.amount)}</td>
                    <td><span class="status-pill ${item.status === 'Paid' ? 'status-paid' : 'status-pending'}">${esc(item.status || 'Pending')}</span></td>
                    <td>${esc(item.notes || '-')}</td>
                    <td><div class="bill-actions"><button type="button" class="mini-btn edit" onclick="editBill('${esc(item.id)}')"><i data-lucide="edit-2" width="14"></i> Edit</button><button type="button" class="mini-btn delete" onclick="deleteBill('${esc(item.id)}')"><i data-lucide="trash-2" width="14"></i> Delete</button></div></td>
                </tr>
            `).join('')}</tbody></table>`;
            if (window.lucide) lucide.createIcons();
        }
        function editBill(id) {
            const item = readBills().find((bill) => bill.id === id);
            if (!item) return;
            billId.value = item.id;
            billType.value = item.type || '';
            billTitle.value = item.title || '';
            billAmount.value = item.amount || '';
            billDate.value = item.billDate || '';
            billStatus.value = item.status || 'Pending';
            billNotes.value = item.notes || '';
            billSaveBtn.innerHTML = '<i data-lucide="save"></i> Update Bill';
            billForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
            if (window.lucide) lucide.createIcons();
        }
        function deleteBill(id) {
            saveBills(readBills().filter((bill) => bill.id !== id));
            renderBills();
        }
        billForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const editId = billId.value;
            const existing = readBills().find((bill) => bill.id === editId);
            const item = {
                id: editId || `BILL-${Date.now()}`,
                type: billType.value,
                title: billTitle.value.trim(),
                amount: Number(billAmount.value || 0),
                billDate: billDate.value,
                status: billStatus.value,
                notes: billNotes.value.trim(),
                campusName: existing?.campusName || (getBillSelectedCampus() === 'all' ? '' : getBillSelectedCampus()),
                createdAt: existing?.createdAt || new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            const bills = readBills();
            const index = bills.findIndex((bill) => bill.id === editId);
            if (index >= 0) bills[index] = item; else bills.push(item);
            saveBills(bills);
            event.target.reset();
            billId.value = '';
            billDate.value = new Date().toISOString().slice(0, 10);
            billSaveBtn.innerHTML = '<i data-lucide="save"></i> Save Bill';
            renderBills();
            showSuccessModal(editId ? 'Bill Updated!' : 'Bill Added!', 'Revenue report will include this bill automatically.');
        });
        billDate.value = new Date().toISOString().slice(0, 10);
        renderBills();
        if (window.lucide) lucide.createIcons();
    </script>
</body>

</html>
