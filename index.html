<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apexiums School Management System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Real-Time SQL Sync -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="login-layout">
        <div class="login-card">

            <!-- New Single Column Design -->
            <div class="login-header">
                <div class="login-icon-circle">
                    <i data-lucide="home"></i>
                </div>
                <h2 class="login-title">My Own School</h2>
                <p class="login-subtitle">Sign in to your account</p>
            </div>

            <div class="login-body">
                <form id="loginForm">
                    <div class="input-group">
                        <label for="email">Username / Email</label>
                        <div style="position: relative;">
                            <input type="text" id="email" placeholder="Enter username or email" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-field">
                            <input type="password" id="password" placeholder="Enter your password" required>
                            <button type="button" class="password-toggle" data-toggle-password="password"
                                aria-label="Show password" aria-pressed="false">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <button type="submit" class="btn btn-success" style="width: 100%;">Sign In</button>

                </form>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
